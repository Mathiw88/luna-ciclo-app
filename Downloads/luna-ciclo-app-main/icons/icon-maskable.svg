<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fondo rosa suave (full bleed para maskable) -->
  <rect width="512" height="512" fill="#F2C4B8"/>
  <!-- Luna creciente centrada en zona segura -->
  <g transform="translate(256, 200)">
    <circle cx="0" cy="0" r="95" fill="#FFF8F5"/>
    <circle cx="44" cy="-16" r="77" fill="#F2C4B8"/>
  </g>
  <!-- Texto LUNA -->
  <text x="256" y="370" font-family="Georgia, 'Times New Roman', serif" font-size="80" font-weight="700" fill="#FFF8F5" text-anchor="middle" letter-spacing="8">LUNA</text>
</svg>
